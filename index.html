<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nanjing Investment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a1a2b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .splash-container {
            max-width: 800px;
            width: 90%;
            padding: 10px;
        }

        .splash-image {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
        }
    </style>
</head>
<body>

    <div class="splash-container" id="splashContainer">
        <img 
            src="nanjing1.jpeg" 
            alt="Nanjing Investment" 
            class="splash-image"
            id="splashImage"
        />
    </div>

    <script>
        // ===== KONFIGURASI =====
        const ONE_HOUR = 60 * 60 * 1000;
        const STORAGE_KEY = 'nanjing_last_visit';

        // ===== CEK WAKTU =====
        function checkLastVisit() {
            const lastVisit = localStorage.getItem(STORAGE_KEY);
            const currentTime = Date.now();

            if (lastVisit) {
                const timeDiff = currentTime - parseInt(lastVisit, 10);
                if (timeDiff < ONE_HOUR) {
                    window.location.href = 'lifecode.html';
                    return true;
                }
            }
            return false;
        }

        // ===== FUNGSI MASUK =====
        function goToLifecode() {
            localStorage.setItem(STORAGE_KEY, Date.now().toString());
            window.location.href = 'lifecode.html';
        }

        // ===== EKSEKUSI =====
        const isRedirected = checkLastVisit();

        if (!isRedirected) {
            // Klik di mana saja akan masuk
            document.body.addEventListener('click', goToLifecode);
            
            // Keyboard: Enter atau Space
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    goToLifecode();
                }
            });

            console.log('✅ Klik gambar atau di mana saja untuk masuk ke lifecode.html');
        }
    </script>

</body>
</html>
